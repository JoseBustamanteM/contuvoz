<div class="tracer-wrapper">

  <div class="canvas-container">
    <canvas #bgCanvas class="canvas-layer background"></canvas>

    <canvas #drawCanvas
            class="canvas-layer drawing"
            (mousedown)="startDrawing($event)"
            (mousemove)="draw($event)"
            (mouseup)="stopDrawing()"
            (mouseleave)="stopDrawing()"
            (touchstart)="startDrawing($event)"
            (touchmove)="draw($event)"
            (touchend)="stopDrawing()">
    </canvas>
  </div>

  @if (resultMessage()) {
    <div class="result-box" [style.color]="resultColor()">
      {{ resultMessage() }}
    </div>
  }

  <div class="controls">
    <button (click)="verify()" class="btn btn-verify">Verificar ✅</button>
    <button (click)="clear()" class="btn btn-clear">Borrar 🧹</button>
  </div>

</div>
