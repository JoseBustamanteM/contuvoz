<div class="flex flex-col items-center w-full h-full gap-2">

  @for (image of images; track image.id) {

    <button
      [routerLink]="image.url"
      class="w-full max-w-xl flex-1 min-h-0 bg-green-400 hover:bg-green-500
             text-white font-bold text-lg sm:text-2xl rounded-3xl shadow-lg
             transition transform hover:scale-105 cursor-pointer
             flex items-center justify-between px-5 py-2">
      <span class="text-left">{{ image.icon }} {{ image.name }}</span>
      <img [src]="image.img" [alt]="image.alt"
           class="h-full max-h-16 w-auto object-contain" />
    </button>
  }

</div>
