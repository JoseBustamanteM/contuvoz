

<div class="flex flex-col items-center w-full ">

  @for (image of images; track image.id) {

    <button
          [routerLink]="image.url"
          class="w-full max-w-xl bg-green-400 hover:bg-green-500
           text-white font-bold text-2xl rounded-3xl shadow-lg transition transform hover:scale-105 cursor-pointer
           flex items-center justify-between p-6 m-1">
          <span class="text-left">{{image.icon}} {{image.name}}</span>
          <img [src]="image.img" [alt]='image.alt' class="w-25 h-auto object-cover"

          />
    </button>

  }

</div>
