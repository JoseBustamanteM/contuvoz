<div class="h-[100dvh] overflow-hidden flex flex-col p-2">
  <app-back-button />

  <section class="bg-white p-3 rounded-3xl shadow-xl max-w-xl w-full border-4 border-green-300
                  text-center mx-auto flex-1 min-h-0 flex flex-col overflow-hidden">
    <main class="main-layout">
      <p class="text-base font-semibold text-green-800 flex items-center justify-center gap-2">
        🦎 ¡Ayúdame a pintar esta letra!
      </p>
      <h1 class="text-lg font-bold text-green-700">🎨 ¡Dibuja la letra!</h1>

      <letter-selector (letterSelected)="currentLetter = $event"></letter-selector>
      <letter-tracer [letter]="currentLetter"></letter-tracer>
    </main>
  </section>
</div>
